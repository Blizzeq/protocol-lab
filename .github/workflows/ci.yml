name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv (+ Python 3.14)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Install deps
        run: uv sync --dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Tests (pytest)
        run: uv run pytest -q
